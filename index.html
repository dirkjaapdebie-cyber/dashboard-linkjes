<!DOCTYPE html>
<html>
<head>
    <style>
        .box { 
            width: 200px; padding: 20px; margin: 10px; 
            background: #ff4757; color: white; border-radius: 8px;
            cursor: grab; text-align: center; font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Sleep dit blokje naar je adresbalk:</h2>
    
    <div class="box" draggable="true" ondragstart="event.dataTransfer.setData('text/plain', 'https://github.com')">
        SLEEP MIJ NAAR BOVEN
    </div>

</body>
</html>
